version: "3.9"

services:
  open-webui:
    #image: ghcr.io/open-webui/open-webui:v0.8.12-cuda
    image: openwebui/open-webui:0.8.12-cuda
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - ./open-webui:/app/backend/data
    restart: always
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    #gpus: all
    runtime: nvidia

  ollama:
    image: ollama/ollama:0.20.3
    # image: ollama/ollama:0.20.5
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    restart: always
    privileged: true
    #gpus: all
    runtime: nvidia

